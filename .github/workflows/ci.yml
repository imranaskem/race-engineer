name: ci

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run pytest tests/ -v

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Generate icon
        run: uv run python create_icon.py

      - name: Install PyInstaller
        run: uv add --dev pyinstaller

      - name: Build exe
        run: uv run python freeze_pyinstaller.py --release

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: LMU-Race-Engineer-${{ steps.version.outputs.version }}-windows.zip
          generate_release_notes: true
